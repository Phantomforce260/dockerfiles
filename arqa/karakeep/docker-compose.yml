networks:
    backend:
        driver: bridge

x-common: &network
    networks:
        - backend
    dns:
        - ${DNS_SERVER}

services:
    karakeep:
        container_name: karakeep
        restart: unless-stopped

        # From ghcr.io/karakeep-app/karakeep:release
        image: ${LF_GIT}/apps/karakeep:release
        deploy:
            resources:
                limits:
                    memory: 256M

        ports:
            - 8002:3000
        <<: *network

        environment:
            MEILI_ADDR: http://meilisearch:7700
            BROWSER_WEB_URL: http://chrome:9222
            DISABLE_SIGNUPS: true
            DATA_DIR: /data
            CRAWLER_ALLOWED_INTERNAL_HOSTNAMES: .lunarflame.dev
        env_file:
            - .env

        volumes:
            - ./data:/data

    chrome:
        container_name: karakeep-chrome
        restart: unless-stopped

        # From gcr.io/zenika-hub/alpine-chrome:124
        image: ${LF_GIT}/linux/alpine/chrome:124

        <<: *network

        command:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
            - --disable-features=UseDBus

    meilisearch:
        container_name: karakeep-search
        restart: unless-stopped

        # From getmeili/meilisearch:v1.41.0
        image: ${LF_GIT}/apps/meilisearch:v1.41.0

        <<: *network

        environment:
            MEILI_NO_ANALYTICS: true
        env_file:
            - .env

        volumes:
            - ./meilisearch:/meili_data

networks:
    backend:
        driver: bridge

services:
    karakeep:
        container_name: karakeep
        restart: unless-stopped

        # From ghcr.io/karakeep-app/karakeep:release
        image: git.lunarflame.dev/docker/apps/karakeep:release

        ports:
            - "8002:3000"
        networks:
            - backend

        environment:
            MEILI_ADDR: http://meilisearch:7700
            BROWSER_WEB_URL: http://chrome:9222
            DISABLE_SIGNUPS: true
            DATA_DIR: /data
        env_file:
            - .env

        volumes:
            - ./data:/data

    chrome:
        container_name: karakeep-chrome
        restart: unless-stopped

        # From gcr.io/zenika-hub/alpine-chrome:124
        image: git.lunarflame.dev/docker/linux/alpine/chrome:124

        networks:
            - backend

        command:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
            - --disable-features=UseDBus

    meilisearch:
        container_name: karakeep-search
        restart: unless-stopped

        # From getmeili/meilisearch:v1.41.0
        image: git.lunarflame.dev/docker/apps/meilisearch:v1.41.0

        networks:
            - backend

        environment:
            MEILI_NO_ANALYTICS: "true"
        env_file:
            - .env

        volumes:
            - ./meilisearch:/meili_data

volumes:
    meilisearch:
    data:

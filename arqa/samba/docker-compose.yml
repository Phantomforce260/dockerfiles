services:
    samba-init:
        container_name: samba-init
        restart: no

        # From alpine:latest
        image: ${LF_GIT}/linux/alpine:latest

        command:
            - /bin/sh
            - -c
            - |
              # Install ACL tools
              apk add --no-cache acl &&

              # Create directories
              mkdir -p \
                  /shares/adri \
                  /shares/javi \
                  /shares/shared &&

              # Set base permissions first
              find /shares -type d -exec chmod 775 {} \; &&
              find /shares -type f -exec chmod 664 {} \;

              # Apply ACLs from host files
              find /shares -type d -exec setfacl -M /tmp/dir.acl {} \; &&
              find /shares -type f -exec setfacl -M /tmp/file.acl {} \;

        volumes:
            - ${SAMBA_DIR}:/shares
            - /tmp/file.acl:/tmp/file.acl:ro
            - /tmp/dir.acl:/tmp/dir.acl:ro

    samba:
        container_name: samba
        restart: unless-stopped
        depends_on:
            samba-init:
                condition: service_completed_successfully

        # From dperson/samba:latest
        image: ${LF_GIT}/apps/samba:latest

        network_mode: host

        environment:
            - USERID=1000
            - GROUPID=1000
        command: >
            -w WORKGROUP
            -g "map to guest = bad user"
            -u "adrian;${ADRI_PW}"
            -u "javi;${JAVI_PW}"
            -s "adri;/data/adri;${MNT_OPT};adrian"
            -s "javi;/data/javi;${MNT_OPT};javi"
            -s "shared;/data/shared;${MNT_OPT};adrian,javi"
            -s "psx;/data/psx;${MNT_OPT};adrian"

        volumes:
            - ${SAMBA_DIR}/adri:/data/adri:z
            - ${SAMBA_DIR}/javi:/data/javi:z
            - ${SAMBA_DIR}/shared:/data/shared:z
            - ~/psx:/data/psx:z

services:
    excalidraw:
        # From excalidraw/excalidraw:latest
        image: git.lunarflame.dev/docker/apps/excalidraw:latest
        container_name: excalidraw
        ports:
            - 8008:80
        restart: unless-stopped
        entrypoint: /bin/sh
        command:
            - -c
            - |
              echo "Replacing WebSocket URL with: $$VITE_APP_WS_SERVER_URL"
              find /usr/share/nginx/html/assets -type f -name "*.js" -exec sed -i 's|https://oss-collab\.excalidraw\.com|'$$VITE_APP_WS_SERVER_URL'|g' {} +
              echo "Starting nginx..."
              nginx -g 'daemon off;'
        environment:
            - NODE_ENV=production
            - VITE_APP_WS_SERVER_URL=https://share.draw.lunarflame.dev
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

    excalidraw-room:
        # From excalidraw/excalidraw-room:latest
        image: git.lunarflame.dev/docker/apps/excalidraw/room:latest
        container_name: excalidraw-room
        ports:
            - 8009:80
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ >/dev/null 2>&1 || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

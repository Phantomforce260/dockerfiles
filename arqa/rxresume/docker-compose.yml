services:
    postgres:
        # From postgres:latest
        image: git.lunarflame.dev/docker/base/postgres:latest
        restart: unless-stopped
        container_name: rxresume-postgres
        environment:
            POSTGRES_DB: postgres
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
        volumes:
            - ./postgres_data:/var/lib/postgresql
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
            interval: 10s
            timeout: 5s
            retries: 10

    reactive-resume:
        # From amruthpillai/reactive-resume:latest
        image: git.lunarflame.dev/docker/apps/rxresume:latest
        container_name: rxresume
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy

        ports:
            - "8013:3000"
        env_file:
            - .env
        volumes:
            # Used when S3 is not configured; keeps uploads persistent
            - ./data:/app/data
        healthcheck:
            test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8013/api/health').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1));"]
            interval: 30s
            timeout: 10s
            retries: 3

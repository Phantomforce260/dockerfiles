networks:
    backend:
        driver: bridge

services:
    nextcloud:
        container_name: nextcloud
        hostname: nextcloud
        restart: unless-stopped
        depends_on:
            - db
            - redis

        # From nextcloud:latest
        # The :mod tag is a custom image that includes ffmpeg for video encoding
        image: git.lunarflame.dev/docker/apps/nextcloud:mod

        ports:
            - "8000:80"
        dns:
            - 192.168.1.6
        networks:
            - backend

        environment:
            MYSQL_HOST: db
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
            NEXTCLOUD_TRUSTED_DOMAINS: "${DOMAIN} nextcloud"
            NEXTCLOUD_PROXY: "true"
            PHP_OPCACHE_MEMORY_CONSUMPTION: 256
            PHP_OPCACHE_MAX_ACCELERATED_FILES: 100000
            PHP_OPCACHE_VALIDATE_TIMESTAMPS: 1
            PHP_OPCACHE_REVALIDATE_FREQ: 60
            PHP_UPLOAD_LIMIT: 100G
            NEXTCLOUD_UPLOAD_LIMIT: 100G
            APACHE_BODY_LIMIT: 0
            PHP_MEMORY_LIMIT: 1024M
            PHP_POST_MAX_SIZE: 100G
            PHP_MAX_EXECUTION_TIME: 3600
        group_add:
            - 1001

        volumes:
            # Nextcloud internal data/config
            - ./data:/var/www/html

            # Samba-backed data (host mounts)
            - ~/psx/necronomicon/samba:/mnt/samba:rw
            - /mnt:/mnt:rw

    db:
        container_name: nextcloud-db
        restart: unless-stopped

        # From mariadb:10.11
        image: git.lunarflame.dev/docker/base/mariadb:10.11

        networks:
            - backend

        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_USER: ${MYSQL_USER}
            MYSQL_PASSWORD: ${MYSQL_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE}
        command: --transaction-isolation=READ-COMMITTED

        volumes:
            - ./mariadb:/var/lib/mysql

    collabora:
        container_name: collabora
        hostname: collabora
        restart: unless-stopped

        # From collabora/code:latest
        image: git.lunarflame.dev/docker/apps/collabora/code:latest

        ports:
            - "8001:9980"

        environment:
            - username=${CB_USER}
            - password=${CB_PASSWD}
            - domain=${DOM_FORMATTED}
            - server_name=${OFFICE_DOMAIN}
            - aliasgroup1=https://${DOM_FORMATTED}:443
            - extra_params=--o:ssl.enable=false --o:ssl.termination=true --o:storage.wopi.host[0]=nextcloud
        cap_add:
            - MKNOD

    redis:
        container_name: nextcloud-redis
        restart: unless-stopped

        # From redis:7-alpine
        image: git.lunarflame.dev/docker/linux/alpine/redis:7

        networks:
            - backend

        command: redis-server --save 60 1 --loglevel warning

        volumes:
            - ./redis:/data

volumes:
    db_data:
    nextcloud_data:

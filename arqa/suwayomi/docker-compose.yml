services:
    suwayomi:
        container_name: suwayomi
        restart: unless-stopped

        # From ghcr.io/suwayomi/suwayomi-server:latest
        image: git.lunarflame.dev/docker/apps/suwayomi/server:latest
        deploy:
            resources:
                limits:
                    memory: 384M

        ports:
            - "8005:5000"

        environment:
            - AUTH_MODE=ui_login
            - AUTH_USERNAME=${AUTH_USER}
            - AUTH_PASSWORD=${AUTH_PW}
            - TZ=${TZ}
            - FLARESOLVERR_ENABLED=true
            - FLARESOLVERR_URL=http://suwayomi-byparr:8191
            - BIND_PORT=5000
            - JAVA_TOOL_OPTIONS=--add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED
        volumes:
            - ${DATA_DIR}:/home/suwayomi/.local/share/Tachidesk

    byparr:
        container_name: suwayomi-byparr
        restart: unless-stopped

        # From ghcr.io/thephaseless/byparr:latest
        image: git.lunarflame.dev/docker/apps/byparr:latest
        deploy:
            resources:
                limits:
                    memory: 128M

        init: true
        environment:
            - TZ=${TZ}

services:
    vaultwarden:
        # From vaultwarden/server:latest
        image: git.lunarflame.dev/docker/apps/vaultwarden/server:latest
        container_name: vaultwarden
        restart: unless-stopped
        environment:
            DOMAIN: "https://${DOMAIN}"
            ADMIN_TOKEN: ${ADMIN_TOKEN}
            SIGNUPS_ALLOWED: false
        volumes:
            - ./data/:/data/
        ports:
            - "8006:80"

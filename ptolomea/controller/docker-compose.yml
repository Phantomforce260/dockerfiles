networks:
    rheia:
        external: true

services:
    controller:
        # From ghcr.io/ggml-org/llama.cpp:server
        image: git.lunarflame.dev/docker/apps/llama.cpp:server
        container_name: llama-controller
        restart: unless-stopped

        ports:
            - "${PORT}:${PORT}"
        networks:
            - rheia

        command: >
            --model /models/${MODEL}/model.gguf
            --host 0.0.0.0
            --port ${PORT}
            --ctx-size ${CTX_SIZE}
            --threads ${THREADS}
            --mlock

        volumes:
            - ~/Models:/models

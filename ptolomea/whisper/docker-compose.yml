networks:
    rheia:
        external: true

services:
    whisper:
        container_name: whisper
        restart: unless-stopped

        image: ${LF_GIT}/rheia/whisper:latest

        ports:
            - "${WHISPER_PORT}:${WHISPER_PORT}"
        networks:
            - rheia

        environment:
            - HOST=0.0.0.0
            - PORT=${WHISPER_PORT}
            - HF_HOME=/cache/huggingface

        volumes:
            - ./hf_cache:/cache/huggingface

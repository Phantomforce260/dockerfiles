networks:
    rheia:
        external: true

services:
    whisper:
        image: git.lunarflame.dev/docker/rheia/whisper:latest
        container_name: whisper
        networks:
            - rheia
        ports:
            - "127.0.0.1:${WHISPER_PORT}:${WHISPER_PORT}"
        restart: unless-stopped
        environment:
            - HOST=0.0.0.0
            - PORT=${WHISPER_PORT}
            - HF_HOME=/cache/huggingface
        volumes:
            - ./hf_cache:/cache/huggingface
volumes:
    hf_cache:

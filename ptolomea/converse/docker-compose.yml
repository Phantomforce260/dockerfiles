networks:
    rheia:
        external: true

services:
    converse:
        # From ghcr.io/ggml-org/llama.cpp:server-cuda13
        image: ${LF_GIT}/apps/llama.cpp:server-cuda13
        container_name: llama-converse
        restart: unless-stopped

        ports:
            - "${PORT}:${PORT}"
        networks:
            - rheia

        deploy:
            resources:
                limits:
                    memory: 28g
        runtime: nvidia
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility

        volumes:
            - ~/Models:/models

        command: >
            --model /models/${MODEL}/model.gguf
            --host 0.0.0.0
            --port ${PORT}
            --ctx-size ${CTX_SIZE}
            --threads ${THREADS}
            --n-gpu-layers ${GPU_LAYERS}
            --mlock

x-llama-common: &llama-common
    image: git.lunarflame.dev/docker/apps/llama.cpp:server
    restart: unless-stopped

    deploy:
        resources:
            limits:
                memory: 28g

    volumes:
        - ./models:/models

services:
    tools:
        <<: *llama-common
        container_name: llama-tools

        deploy:
            replicas: ${REPLICAS}

        ports:
            - "${TOOL_PORT}:${TOOL_PORT}"
        networks:
            - rheia

        command: >
            --model /models/${TOOL_MODEL}/model.gguf
            --host 0.0.0.0
            --port ${TOOL_PORT}
            --ctx-size 512
            --threads ${THREADS}
            --n-gpu-layers ${GPU_LAYERS}
            --mlock

        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${TOOL_PORT}/health"]
            interval: 30s
            timeout: 10s
            retries: 3

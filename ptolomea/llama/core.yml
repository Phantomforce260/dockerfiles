networks:
    rheia:
        external: true

x-llama-common: &llama-common
    image: ghcr.io/ggml-org/llama.cpp:server-cuda13
    restart: unless-stopped
    volumes:
        - ./models:/models

services:
    llama:
        <<: *llama-common
        container_name: llama-server
        runtime: nvidia
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility

        ports:
            - "${TEXT_PORT}:${TEXT_PORT}"
        deploy:
            replicas: ${REPLICAS}
            resources:
                limits:
                    memory: 28g
        networks:
            - rheia

        command: >
            --model /models/${TEXT_MODEL}/model.gguf
            --host 0.0.0.0
            --port ${TEXT_PORT}
            --ctx-size ${CTX_SIZE}
            --threads ${THREADS}
            --n-gpu-layers ${GPU_LAYERS}
            --mlock
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${TEXT_PORT}/health"]
            interval: 30s
            timeout: 10s
            retries: 3

    embeddings:
        <<: *llama-common
        container_name: llama-embeddings
        runtime: nvidia
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility

        ports:
            - "${EMBED_PORT}:${EMBED_PORT}"
        networks:
            - rheia

        command: >
            --model /models/${EMBED_MODEL}/model.gguf
            --host 0.0.0.0
            --port ${EMBED_PORT}
            --embedding
            --ctx-size 512
            --threads ${THREADS}
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${EMBED_PORT}/health"]
            interval: 30s
            timeout: 10s
            retries: 3


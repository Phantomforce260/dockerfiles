networks:
    rheia:
        external: true

x-llama-common: &llama-common
    image: git.lunarflame.dev/docker/apps/llama.cpp:server
    restart: unless-stopped

    deploy:
        resources:
            limits:
                memory: 28g

    volumes:
        - ./models:/models

services:
    llama:
        <<: *llama-common
        container_name: llama-server

        deploy:
            replicas: ${REPLICAS}

        ports:
            - "${TEXT_PORT}:${TEXT_PORT}"
        networks:
            - rheia

        command: >
            --model /models/${TEXT_MODEL}/model.gguf
            --host 0.0.0.0
            --port ${TEXT_PORT}
            --ctx-size ${CTX_SIZE}
            --threads ${THREADS}
            --n-gpu-layers ${GPU_LAYERS}
            --mlock
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${TEXT_PORT}/health"]
            interval: 30s
            timeout: 10s
            retries: 3

    embeddings:
        <<: *llama-common
        container_name: llama-embeddings

        ports:
            - "${EMBED_PORT}:${EMBED_PORT}"
        networks:
            - rheia

        command: >
            --model /models/${EMBED_MODEL}/model.gguf
            --host 0.0.0.0
            --port ${EMBED_PORT}
            --embedding
            --ctx-size 512
            --threads ${THREADS}
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${EMBED_PORT}/health"]
            interval: 30s
            timeout: 10s
            retries: 3


networks:
    rheia:
        external: true

services:
    vision:
        # From ghcr.io/ggml-org/llama.cpp:server-cuda13
        image: git.lunarflame.dev/docker/apps/llama.cpp:server-cuda13
        restart: unless-stopped
        volumes:
            - ~/Models:/models
        container_name: llama-vision
        runtime: nvidia
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility

        ports:
            - "${PORT}:${PORT}"
        networks:
            - rheia

        command: >
            --model /models/${MODEL}/model.gguf
            --mmproj /models/${MODEL}/mmproj.gguf
            --host 0.0.0.0
            --port ${PORT}
            --ctx-size ${CTX_SIZE}
            --threads ${THREADS}
            --n-gpu-layers ${GPU_LAYERS}
            --mlock

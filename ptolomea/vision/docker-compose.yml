networks:
    rheia:
        external: true

services:
    vision:
        # From ghcr.io/ggml-org/llama.cpp:server-cuda13
        image: git.lunarflame.dev/docker/apps/llama.cpp:server-cuda13
        restart: unless-stopped
        volumes:
            - ~/Models:/models
        container_name: llama-vision
        runtime: nvidia
        environment:
            - NVIDIA_VISIBLE_DEVICES=all
            - NVIDIA_DRIVER_CAPABILITIES=compute,utility

        ports:
            - "${VISION_PORT}:${VISION_PORT}"
        deploy:
            replicas: ${REPLICAS}
        networks:
            - rheia

        command: >
            --model /models/${VISION_MODEL}/model.gguf
            --mmproj /models/${VISION_MODEL}/mmproj.gguf
            --host 0.0.0.0
            --port ${VISION_PORT}
            --ctx-size ${VISION_CTX_SIZE}
            --threads ${THREADS}
            --n-gpu-layers ${GPU_LAYERS}
            --mlock

        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${VISION_PORT}/health"]
            interval: 30s
            timeout: 10s
            retries: 3

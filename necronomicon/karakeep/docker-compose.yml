networks:
    web:
        external: true
    backend:
        driver: bridge

services:
    karakeep:
        image: git.lunarflame.dev/docker/apps/karakeep:release
        container_name: karakeep
        restart: unless-stopped
        volumes:
            - ./data:/data
        ports:
            - "3000"
        env_file:
            - .env
        environment:
            MEILI_ADDR: http://meilisearch:7700
            BROWSER_WEB_URL: http://chrome:9222
            DISABLE_SIGNUPS: true
            DATA_DIR: /data
        networks:
            - web
            - backend

    chrome:
        image: git.lunarflame.dev/docker/linux/alpine/chrome:124
        container_name: karakeep-chrome
        restart: unless-stopped
        command:
            - --no-sandbox
            - --disable-gpu
            - --disable-dev-shm-usage
            - --remote-debugging-address=0.0.0.0
            - --remote-debugging-port=9222
            - --hide-scrollbars
            - --disable-features=UseDBus
        networks:
            - backend

    meilisearch:
        image: git.lunarflame.dev/docker/apps/meilisearch:v1.41.0
        container_name: karakeep-search
        restart: unless-stopped
        env_file:
            - .env
        environment:
            MEILI_NO_ANALYTICS: "true"
        volumes:
            - ./meilisearch:/meili_data
        networks:
            - backend

volumes:
    meilisearch:
    data:

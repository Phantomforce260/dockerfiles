networks:
    web:
        external: true

services:
    pihole:
        image: git.lunarflame.dev/docker/apps/pihole:latest
        container_name: pihole
        restart: unless-stopped
        networks:
            web:
        ports:
            # DNS Ports
            - "53:53/tcp"
            - "53:53/udp"

            # HTTP
            - "80/tcp"
            # HTTPS
            - "443/tcp"
        environment:
            TZ: 'EST'
            FTLCONF_webserver_api_password: ${ADMIN_PW}
            FTLCONF_dns_listeningMode: 'ALL'
        volumes:
            - './etc-pihole:/etc/pihole'
        cap_add:
            - NET_ADMIN
            - SYS_TIME
            - SYS_NICE

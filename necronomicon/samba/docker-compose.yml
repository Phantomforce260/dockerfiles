services:
    samba:
        # From dperson/samba:latest
        image: git.lunarflame.dev/docker/apps/samba:latest
        container_name: samba
        restart: unless-stopped
        network_mode: host

        environment:
            - USERID=1000
            - GROUPID=1000

        command: >
            -w WORKGROUP
            -g "map to guest = bad user"
            -u "adrian;${ADRI_PW}"
            -u "javi;${JAVI_PW}"
            -s "adri;/data/adri;${MNT_OPT};adrian"
            -s "javi;/data/javi;${MNT_OPT};javi"
            -s "shared;/data/shared;${MNT_OPT};adrian,javi"
            -s "minecraft;/data/minecraft;${MNT_OPT};adrian"
            -s "psx;/data/psx;${MNT_OPT};adrian"

        volumes:
            # Internal shares (local to docker-compose.yml directory)
            - ./adri:/data/adri:z
            - ./javi:/data/javi:z
            - ./shared:/data/shared:z

            # External drives (mounted in-place)
            - ~/backupmc:/data/minecraft:z
            - ~/psx:/data/psx:z

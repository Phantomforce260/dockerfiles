networks:
    web:
        external: true

services:
    minio:
        image: git.lunarflame.dev/docker/apps/minio:latest
        container_name: minio
        restart: unless-stopped
        ports:
            - "127.0.0.1:9000:9000" # API
            - "127.0.0.1:9001:9001" # Console UI
        environment:
            MINIO_ROOT_USER: ${ROOT_USERNAME}
            MINIO_ROOT_PASSWORD: ${ROOT_PASSWORD}
        volumes:
            - ./data:/data
        command: server /data --console-address ":9001"
        networks:
            - web

volumes:
    data:

networks:
    web:
        external: true

services:
    minio:
        # From minio/minio:latest
        image: git.lunarflame.dev/docker/apps/minio:latest
        container_name: minio
        restart: unless-stopped
        ports:
            - "127.0.0.1:${API_PORT}:${API_PORT}" # API
            - "127.0.0.1:${CONSOLE_PORT}:${CONSOLE_PORT}" # Console UI
        environment:
            MINIO_ROOT_USER: ${ROOT_USERNAME}
            MINIO_ROOT_PASSWORD: ${ROOT_PASSWORD}
        volumes:
            - ~/psx/necronomicon/minio:/data
        command: server /data --console-address ":${CONSOLE_PORT}"
        networks:
            - web

volumes:
    data:

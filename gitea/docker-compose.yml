networks:
    gitea:
        external: false

services:
    server:
        image: docker.gitea.com/gitea:1.25.2
        container_name: gitea
        environment:
            - USER_UID=1000
            - USER_GID=1000
            - GITEA__database__DB_TYPE=mysql
            - GITEA__database__HOST=db:3306
            - GITEA__database__NAME=${GITEA_DB_NAME}
            - GITEA__database__USER=${GITEA_DB_USER}
            - GITEA__database__PASSWD=${GITEA_DB_PASSWD}
            - GITEA__server__ROOT_URL=https://git.lunarflame.dev
            - GITEA__server__DOMAIN=git.lunarflame.dev
            - GITEA__server__SSH_DOMAIN=ssh.git.lunarflame.dev
            - GITEA__service__DISABLE_REGISTRATION=true
            - GITEA__service__REQUIRE_SIGNIN_VIEW=true
        restart: always
        networks:
            - gitea
        volumes:
            - ./gitea:/data
            - /etc/timezone:/etc/timezone:ro
            - /etc/localtime:/etc/localtime:ro
        ports:
            - "3000:3000"
            - "2222:2222"
        depends_on:
            - db

    db:
        image: mysql@sha256:90544b3775490579867a30988d48f0215fc3b88d78d8d62b2c0d96ee9226a2b7
        restart: always
        environment:
            - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
            - MYSQL_USER=${MYSQL_USER}
            - MYSQL_PASSWORD=${MYSQL_PASSWORD}
            - MYSQL_DATABASE=${MYSQL_DATABASE}
        networks:
            - gitea
        volumes:
            - gitea-mysql:/var/lib/mysql

volumes:
    gitea-mysql:

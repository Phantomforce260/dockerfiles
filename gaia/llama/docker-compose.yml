x-llama-common: &llama-common
    image: git.lunarflame.dev/docker/apps/llama.cpp:server
    restart: unless-stopped
    volumes:
        - ./models:/models
    deploy:
        resources:
            limits:
                memory: 28g

services:
    llama:
        <<: *llama-common
        container_name: llama-server
        command: >
            --model /models/${TEXT_MODEL}/model.gguf
            --host 0.0.0.0
            --port ${TEXT_PORT}
            --ctx-size ${CTX_SIZE}
            --threads ${THREADS}
            --n-gpu-layers ${GPU_LAYERS}
            --mlock
        ports:
            - "${TEXT_PORT}:8000"
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:${TEXT_PORT}/health"]
            interval: 30s
            timeout: 10s
            retries: 3
        deploy:
            replicas: ${REPLICAS}

    embeddings:
        <<: *llama-common
        container_name: llama-embeddings
        command: >
            --model /models/${EMBED_MODEL}/model.gguf
            --host 0.0.0.0
            --port ${EMBED_PORT}
            --embedding
            --ctx-size 512
            --threads ${THREADS}
        ports:
            - "${EMBED_PORT}:8000"

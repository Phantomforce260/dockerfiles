
x-llama-common: &llama-common
  image: ghcr.io/ggml-org/llama.cpp:server
  restart: unless-stopped
  volumes:
    - ./models:/models
  command: >
    --model ${MODEL_PATH}
    --host 0.0.0.0
    --port 8000
    --ctx-size ${CTX_SIZE}
    --threads ${THREADS}
    --n-gpu-layers ${GPU_LAYERS}
    --mlock
  deploy:
    resources:
      limits:
        memory: 28g
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    interval: 30s
    timeout: 10s
    retries: 3

services:
  llama:
    <<: *llama-common
    container_name: llama-server
    ports:
      - "${PORT}:8000"
    deploy:
      replicas: ${REPLICAS}

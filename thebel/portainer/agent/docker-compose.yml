services:
    agent:
        # From portainer/agent:lts
        image: ${LF_GIT}/apps/portainer/agent:lts
        container_name: portainer-agent
        restart: unless-stopped
        ports:
            - 9002:9001
        volumes:
            - /var/run/docker.sock:/var/run/docker.sock
            - /var/lib/docker/volumes:/var/lib/docker/volumes

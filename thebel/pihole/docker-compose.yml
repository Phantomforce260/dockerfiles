services:
    pihole:
        container_name: pihole
        restart: unless-stopped

        # From pihole/pihole:latest
        image: ${LF_GIT}/apps/pihole:latest

        ports:
            - 8003:80
            # DNS Ports
            - 53:53/tcp
            - 53:53/udp

        environment:
            TZ: 'EST'
            FTLCONF_webserver_api_password: ${ADMIN_PW}
            FTLCONF_dns_listeningMode: 'ALL'
        cap_add:
            - NET_ADMIN
            - SYS_TIME
            - SYS_NICE

        volumes:
            - ./etc-pihole:/etc/pihole

services:
    wireguard:
        container_name: wireguard 
        restart: unless-stopped

        # From ghcr.io/wgdashboard/wgdashboard:latest
        image: ${LF_GIT}/apps/wgdashboard:latest

        ports:
            - "8004:10086"
            - "51820:51820/udp"
        dns:
            - ${DNS_SERVER}

        cap_add:
            - NET_ADMIN

        volumes:
            - ./aconf:/etc/amnezia/amneziawg
            - ./conf:/etc/wireguard
            - ./data:/data
